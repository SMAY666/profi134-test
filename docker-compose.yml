services:
  rabbitmq:
      image: rabbitmq:4.3.0-management
      container_name: rabbitmq
      ports:
        - "15672:15672"
        - "5672:5672"
      environment:
        RABBITMQ_DEFAULT_USER: admin
        RABBITMQ_DEFAULT_PASS: admin
      healthcheck:
        test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
        interval: 10s
        timeout: 5s
        retries: 5
  producer:
    build:
      context: .
      dockerfile: ./src/apps/producer/Dockerfile
    container_name: producer
    ports:
      - "8001:8001"
    depends_on:
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env

  consumer:
    build:
      context: .
      dockerfile: ./src/apps/consumer/Dockerfile
    container_name: consumer
    depends_on:
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env

  notifier:
    build:
      context: .
      dockerfile: ./src/apps/notifier/Dockerfile
    container_name: notifier
    depends_on:
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env